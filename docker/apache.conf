<VirtualHost *:${APACHE_PORT}>
    ServerName localhost
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/storage>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html/storage/exports>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/storage/thumbnails>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/data>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html/includes>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/csf_error.log
    CustomLog ${APACHE_LOG_DIR}/csf_access.log combined
</VirtualHost>