# docker/apache.conf — Apache VirtualHost für Cinematic Studio Family
# Wird via Dockerfile nach /etc/apache2/sites-available/000-default.conf kopiert.

<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    # ── Haupt-Verzeichnis ─────────────────────────────────────────────────────
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes          # Directory-Listing deaktivieren
    </Directory>

    # ── Storage: kein direkter Web-Zugriff ───────────────────────────────────
    # Rohdateien (uploads, temp, thumbnails) sind nur über API zugänglich.
    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    # ── Exports: Download-Zugriff erlaubt ────────────────────────────────────
    # Fertige MP4-Exporte müssen direkt herunterladbar sein.
    # Nur .mp4-Dateien erlaubt — kein PHP-Execution, kein Directory-Listing.
    <Directory /var/www/html/storage/exports>
        Require all granted
        Options -Indexes -ExecCGI
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ── Data: kein direkter Web-Zugriff ──────────────────────────────────────
    # JSON-Daten in data/ dürfen nicht öffentlich erreichbar sein.
    <Directory /var/www/html/data>
        Require all denied
    </Directory>

    # ── Includes: kein direkter Web-Zugriff ──────────────────────────────────
    <Directory /var/www/html/includes>
        Require all denied
    </Directory>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/csf_error.log
    CustomLog ${APACHE_LOG_DIR}/csf_access.log combined
</VirtualHost>
